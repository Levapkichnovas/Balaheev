<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Страница не найдена | ИП Балахеев Ю.Б.</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 50 50'><path d='M25 4C25 4 10 22 10 32C10 40.3 16.7 47 25 47C33.3 47 40 40.3 40 32C40 22 25 4 25 4Z' fill='%23005b9f'/></svg>">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', Arial, sans-serif; background: #f8f9fa; display: flex; align-items: center; justify-content: center; min-height: 100vh; text-align: center; padding: 20px; color: #222; }
        .error-box h1 { font-size: 120px; font-weight: 800; color: #005b9f; line-height: 1; }
        .error-box p { font-size: 18px; color: #666; margin: 15px 0 30px; }
        .error-box a { display: inline-block; background: #ff7a00; color: #fff; padding: 14px 28px; text-decoration: none; border-radius: 8px; font-weight: 600; font-size: 16px; transition: background 0.3s; }
        .error-box a:hover { background: #e66e00; }
    </style>
</head>
<body>
    <div class="error-box">
        <h1>404</h1>
        <p>Страница не найдена. Возможно, она была удалена или вы ввели неверный адрес.</p>
        <a href="/">Вернуться на главную</a>
    </div>
</body>
</html>
